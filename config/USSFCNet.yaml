# config/USSFCNet.yaml
data_config: '__base__/LEVIR_CD.yaml'

model:
  name: 'USSFCNet'
  params:
    in_ch: 3
    num_classes: 2
    ratio: 0.5

optimizer_type: 'adamw'
lr: 0.0001
momentum: 0.9
weight_decay: 0.0001
scheduler_type: 'gradual_warm'
warmup_epochs: 5

loss_type: ['ce', ]
loss_weight: [1.0, ]
aux_loss_weights: null

epochs: 200
batch_size: 2

log_dir: './logs'
save_period: 50
resume_training: null      # 这里是完整的模型检查点路径（包含记忆项）